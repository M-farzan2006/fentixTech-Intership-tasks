<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram UI Clone</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="app-container">

    <div class="phone-screen">
      <header class="screen-header">
        <span class="username">Itx.Farzan</span>
        <div class="header-icons">
          <i class="fa-regular fa-square-plus"></i>
          <i class="fa-solid fa-bars"></i>
        </div>
      </header>

      <main class="scrollable-content">
        <section class="profile-info">
          <div class="profile-avatar-wrapper">
            <div class="profile-avatar main-avatar"></div>
          </div>
          <div class="profile-stats">
            <div class="stat"><strong>10</strong><span>Posts</span></div>
            <div class="stat"><strong>45</strong><span>Followers</span></div>
            <div class="stat"><strong>100</strong><span>Following</span></div>
          </div>
        </section>

        <section class="profile-bio">
          <h3>Muhammad Farzan</h3>
          <p>A Web Developer.</p>
        </section>

        <section class="profile-actions">
          <button class="btn">Edit Profile</button>
          <button class="btn">Share Profile</button>
        </section>

        <section class="stories-highlights">
          <div class="story-item"><div class="story-circle new-story"><i class="fa-solid fa-plus"></i></div></div>
          <div class="story-item"><div class="story-circle-filled"></div></div>
          <div class="story-item"><div class="story-circle-filled"></div></div>
          <div class="story-item"><div class="story-circle-filled"></div></div>
        </section>

        <nav class="profile-tabs">
          <div class="tab active"><i class="fa-solid fa-grid-3x3"></i></div>
          <div class="tab"><i class="fa-regular fa-id-badge"></i></div>
        </nav>

        <section class="posts-grid">
          <div class="grid-post gradient-post"></div>
          <div class="grid-post gradient-post"></div>
          <div class="grid-post gradient-post"></div>
        </section>
      </main>

      <footer class="screen-footer">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-regular fa-heart"></i>
        <div class="footer-avatar"></div>
      </footer>
    </div>


    <div class="phone-screen">
      <header class="screen-header">
        <span class="logo-text">Instagram</span>
        <div class="header-icons">
          <i class="fa-regular fa-heart"></i>
          <i class="fa-regular fa-paper-plane"></i>
        </div>
      </header>

      <main class="scrollable-content">
        <section class="stories-feed">
          <div class="story-feed-item"><div class="story-circle-filled gradient-border"></div></div>
          <div class="story-feed-item"><div class="story-circle-filled gradient-border"></div></div>
          <div class="story-feed-item"><div class="story-circle-filled gradient-border"></div></div>
          <div class="story-feed-item"><div class="story-circle-filled gradient-border"></div></div>
        </section>

        <article class="feed-post">
          <div class="post-header">
            <div class="post-user-avatar"></div>
            <span class="post-username">Itx.Farzan</span>
            <i class="fa-solid fa-ellipsis-vertical post-more"></i>
          </div>
          <div class="post-media gradient-post"></div>
          <div class="post-actions">
            <div class="left-actions">
              <i class="fa-regular fa-heart"></i>
              <i class="fa-regular fa-comment"></i>
              <i class="fa-regular fa-paper-plane"></i>
            </div>
            <i class="fa-regular fa-bookmark"></i>
          </div>
          <div class="post-details">
            <div class="post-user-comment"></div>
            <div class="post-user-comment"></div>
          </div>
        </article>
      </main>

      <footer class="screen-footer">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-solid fa-heart"></i> <div class="footer-avatar"></div>
      </footer>
    </div>


    <div class="phone-screen">
      <header class="screen-header search-header">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span>Search</span>
        </div>
      </nav>

      <main class="scrollable-content">
        <section class="explore-grid">
          <div class="explore-item item-1 gradient-post"></div>
          <div class="explore-item item-tall gradient-post"></div>
          <div class="explore-item item-2 gradient-post"></div>
          <div class="explore-item item-3 gradient-post"></div>
          <div class="explore-item item-4 gradient-post"></div>
          <div class="explore-item item-5 gradient-post"></div>
          <div class="explore-item item-6 gradient-post"></div>
        </section>
      </main>

      <footer class="screen-footer">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-regular fa-heart"></i>
        <div class="footer-avatar"></div>
      </footer>
    </div>

  </div>

</body>
</html>
