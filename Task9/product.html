<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product — Furnitur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="nav">
  <div class="container nav__row">
    <button class="nav__menu-toggle" data-menu-toggle aria-label="Toggle menu" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
    </button>
    <a href="index.html" class="nav__logo">
      <strong>Furnitur</strong>
      <span>Your future interior</span>
    </a>
    <nav class="nav__links" data-nav-menu>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="index.html#blogs">Blog</a>
      <a href="index.html#about">About Us</a>
    </nav>
    <form class="nav__search" data-nav-search role="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
      <input type="search" placeholder="Search something" aria-label="Search products" />
    </form>
    <div class="nav__actions">
      <a href="shop.html?category=On+Sale" class="nav__icon-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7.5-4.6-10-9.3C.4 8 2 4.5 5.6 4c2-.3 3.9.7 5 2.3 1.1-1.6 3-2.6 5-2.3 3.6.5 5.2 4 3.6 7.7-2.5 4.7-10 9.3-10 9.3Z"/></svg>
        Love
      </a>
      <a href="cart.html" class="nav__icon-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16l-1.5 11.5a2 2 0 0 1-2 1.5H7.5a2 2 0 0 1-2-1.5L4 7Z"/><path d="M8 7V6a4 4 0 0 1 8 0v1" stroke-linecap="round"/></svg>
        Cart
        <span class="nav__badge is-hidden" data-cart-count>0</span>
      </a>
    </div>
  </div>
</header>

<main>
  <div class="container" data-product-root>
    <nav class="breadcrumb" data-breadcrumb></nav>

    <div class="product-detail">
      <div class="product-detail__media">
        <img data-product-image src="" alt="" />
      </div>
      <div class="product-detail__info">
        <span class="eyebrow">Furnitur</span>
        <h1 data-product-name></h1>
        <div class="product-detail__rating" data-product-rating></div>
        <div class="product-detail__price" data-product-price></div>
        <p class="product-detail__desc" data-product-description></p>

        <div data-product-variants></div>

        <div class="purchase-row">
          <div class="qty-stepper">
            <button type="button" data-qty-decrease aria-label="Decrease quantity">−</button>
            <span data-qty-value>1</span>
            <button type="button" data-qty-increase aria-label="Increase quantity">+</button>
          </div>
          <button type="button" class="btn btn--primary" data-add-to-cart-main>Add to Cart</button>
          <button type="button" class="btn btn--outline" data-buy-now>Buy Now</button>
        </div>

        <div class="product-detail__features">
          <h3>Details &amp; features</h3>
          <ul data-product-features></ul>
        </div>
      </div>
    </div>

    <section class="section section--tight">
      <div class="section-head">
        <span class="eyebrow">Pairs well together</span>
        <h2>Best Combined With</h2>
      </div>
      <div class="product-grid" data-related-grid></div>
    </section>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom" style="border-top:none; padding-top:0;">
      <span>Furnitur © Copyright 2026, Inc. All rights reserved</span>
      <div class="footer__social">
        <a href="#" aria-label="Facebook">FB</a>
        <a href="#" aria-label="Twitter">TW</a>
        <a href="#" aria-label="Instagram">IG</a>
        <a href="#" aria-label="Pinterest">PT</a>
      </div>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/render.js"></script>
<script src="js/nav.js"></script>
<script src="js/product.js"></script>
</body>
</html>
